apiVersion: v1
kind: ConfigMap
metadata:
  name: offmirror-nginx
  namespace: offmirror
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /data;

      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime on;

      # Заголовки атрибуции ODbL
      add_header X-Data-Source "Open Food Facts - https://world.openfoodfacts.org" always;
      add_header X-Data-License "ODbL - https://opendatacommons.org/licenses/odbl/1.0/" always;

      location / {
        try_files $uri $uri/ =404;
      }

      # Отдаём большие файлы без буферизации в память
      location ~* \.(gz|jsonl|csv|bson)$ {
        proxy_buffering off;
        sendfile on;
        tcp_nopush on;
      }
    }
