apiVersion: apps/v1
kind: Deployment
metadata:
  name: offmirror
  namespace: offmirror
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: offmirror
  template:
    metadata:
      labels:
        app: offmirror
    spec:
      containers:
        - name: nginx
          image: docker.io/library/nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /data
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: offmirror-data
        - name: nginx-config
          configMap:
            name: offmirror-nginx
