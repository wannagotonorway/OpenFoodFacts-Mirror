apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: offapi
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/wannagotonorway/ServersCFG
    targetRevision: master
    path: apps/offapi
  destination:
    server: https://kubernetes.default.svc
    namespace: offapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
